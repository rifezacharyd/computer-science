# Alacritty Terminal Configuration
# Place at: ~/.config/alacritty/alacritty.toml

[window]
padding = { x = 8, y = 8 }
decorations = "Buttonless"
opacity = 0.95
startup_mode = "Windowed"

[scrolling]
history = 10000

[font]
size = 14.0

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[cursor]
style = { shape = "Block", blinking = "On" }
vi_mode_style = { shape = "Beam" }

[mouse]
hide_when_typing = true

# Key bindings
[[keyboard.bindings]]
key = "N"
mods = "Command"
action = "SpawnNewInstance"
