# Starship Prompt Configuration
# Install: curl -sS https://starship.rs/install.sh | sh

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"

[python]
format = '[${symbol}${pyenv_prefix}(${version})]($style) '
symbol = " "
style = "yellow"

[nodejs]
format = "[$symbol($version)]($style) "
symbol = " "
style = "green"

[rust]
format = "[$symbol($version)]($style) "
symbol = " "
style = "red"

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "yellow dimmed"
